<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Starbase 2075: GRU Hotel Transit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@700;900&family=Oxanium:wght@600;800&family=Saira+Condensed:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --beskar: #7a8a9c;
      --charcoal: #1a1d24;
      --amber: #ff9a3c;
      --hero-gold: #ffd23f;
      --hero-stroke: #5e4500;
      --text: #e8e8e0;
      --telemetry: rgba(232, 232, 224, 0.72);
      --panel: rgba(16, 20, 28, 0.78);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #05070b;
      color: var(--text);
      font-family: "Share Tech Mono", "Courier New", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    #hud {
      position: fixed;
      left: 18px;
      bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 250px;
      padding: 11px 15px;
      border: 1px solid rgba(255, 154, 60, 0.42);
      background: linear-gradient(90deg, rgba(26, 29, 36, 0.9), rgba(26, 29, 36, 0.54));
      color: var(--hero-gold);
      font-family: "Orbitron", "Audiowide", sans-serif;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      -webkit-text-stroke: 1px var(--hero-stroke);
      text-shadow: 0 0 12px rgba(255, 174, 0, 0.72), 0 0 28px rgba(255, 154, 60, 0.28);
      backdrop-filter: blur(12px);
      clip-path: polygon(9% 0, 91% 0, 100% 34%, 93% 100%, 7% 100%, 0 34%);
      z-index: 6;
      pointer-events: none;
    }

    .visor {
      width: 24px;
      height: 14px;
      border: 2px solid var(--amber);
      border-bottom-width: 5px;
      clip-path: polygon(0 0, 100% 0, 82% 100%, 18% 100%);
      filter: drop-shadow(0 0 8px rgba(255, 154, 60, 0.8));
    }

    #returnBtn, .mission-card, #closePanel {
      font: 800 13px "Oxanium", sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
      border: 1px solid rgba(255, 154, 60, 0.55);
      background: rgba(26, 29, 36, 0.78);
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    #returnBtn {
      position: fixed;
      right: 18px;
      bottom: 18px;
      min-width: 198px;
      height: 44px;
      padding: 0 18px;
      clip-path: polygon(8% 0, 92% 0, 100% 50%, 92% 100%, 8% 100%, 0 50%);
      z-index: 6;
      display: none;
    }

    #location {
      display: inline-block;
      transform: perspective(520px) rotateX(9deg) scaleX(1.04);
      transform-origin: left center;
      animation: locationIntro 740ms cubic-bezier(.16,1,.3,1) 120ms both;
    }

    #earthViewBtn {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      min-width: 168px;
      height: 44px;
      padding: 0 18px;
      clip-path: polygon(8% 0, 92% 0, 100% 50%, 92% 100%, 8% 100%, 0 50%);
      z-index: 6;
      display: none;
    }

    #returnBtn:hover, #earthViewBtn:hover, .mission-card:hover, #closePanel:hover {
      border-color: var(--amber);
      background: rgba(255, 154, 60, 0.16);
      transform: translateY(-1px);
    }

    #earthViewBtn:hover {
      transform: translateX(-50%) translateY(-1px);
    }

    #tooltip {
      position: fixed;
      left: 0;
      top: 0;
      transform: translate(-50%, calc(-100% - 18px));
      min-width: 210px;
      padding: 10px 14px 12px;
      border: 1px solid rgba(255, 154, 60, 0.7);
      background: rgba(10, 13, 18, 0.86);
      color: var(--telemetry);
      font-family: "Share Tech Mono", monospace;
      font-size: 12px;
      line-height: 1.35;
      pointer-events: none;
      opacity: 0;
      clip-path: polygon(12% 0, 88% 0, 100% 35%, 90% 100%, 10% 100%, 0 35%);
      filter: drop-shadow(0 0 18px rgba(255, 154, 60, 0.28));
      z-index: 7;
    }

    #tooltip strong {
      color: var(--amber);
      font-family: "Oxanium", sans-serif;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 154, 60, 0.38);
    }

    #missionPanel {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      width: min(560px, calc(100vw - 32px));
      padding: 22px;
      border: 1px solid rgba(255, 154, 60, 0.62);
      background: rgba(9, 12, 18, 0.88);
      box-shadow: 0 0 48px rgba(255, 154, 60, 0.16), inset 0 0 38px rgba(122, 138, 156, 0.08);
      backdrop-filter: blur(18px);
      clip-path: polygon(10% 0, 90% 0, 100% 24%, 95% 100%, 5% 100%, 0 24%);
      opacity: 0;
      pointer-events: none;
      z-index: 9;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #missionPanel.open {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    #missionPanel h2 {
      margin: 0 0 16px;
      color: var(--amber);
      font-family: "Oxanium", sans-serif;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      -webkit-text-stroke: 0.4px rgba(8, 10, 14, 0.8);
      text-shadow: 0 0 10px rgba(255, 154, 60, 0.36);
      text-align: center;
    }

    .mission-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .mission-card {
      min-height: 106px;
      padding: 14px 12px;
      text-align: left;
      clip-path: polygon(8% 0, 92% 0, 100% 18%, 94% 100%, 6% 100%, 0 18%);
    }

    .mission-card strong {
      display: block;
      color: var(--text);
      font-family: "Oxanium", sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.05em;
      line-height: 1.2;
      margin-bottom: 8px;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 154, 60, 0.26);
    }

    .mission-card span {
      color: var(--telemetry);
      font-family: "Share Tech Mono", monospace;
      font-size: 11px;
      line-height: 1.35;
    }

    #closePanel {
      display: block;
      margin: 15px auto 0;
      height: 34px;
      padding: 0 18px;
      clip-path: polygon(12% 0, 88% 0, 100% 50%, 88% 100%, 12% 100%, 0 50%);
    }

    #welcome {
      position: fixed;
      left: 50%;
      top: 29%;
      transform: translate(-50%, -50%);
      width: min(680px, calc(100vw - 34px));
      color: var(--hero-gold);
      font-family: "Audiowide", "Orbitron", sans-serif;
      text-align: center;
      font-size: clamp(18px, 3vw, 34px);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.24;
      -webkit-text-stroke: 1px var(--hero-stroke);
      text-shadow: 0 0 12px rgba(255, 174, 0, 0.78), 0 0 38px rgba(255, 154, 60, 0.32);
      opacity: 0;
      z-index: 5;
      pointer-events: none;
      transition: opacity 700ms ease, transform 700ms ease;
    }

    #welcome.show {
      opacity: 1;
      transform: translate(-50%, -62%);
    }

    #iris {
      position: fixed;
      inset: 0;
      background: #020306;
      z-index: 20;
      pointer-events: none;
      clip-path: circle(0% at 50% 50%);
    }

    #hint {
      position: fixed;
      left: 18px;
      top: 18px;
      max-width: 440px;
      padding: 11px 14px;
      color: var(--telemetry);
      font-family: "Share Tech Mono", monospace;
      border-left: 2px solid rgba(255, 154, 60, 0.58);
      background: rgba(4, 6, 10, 0.34);
      font-size: 12px;
      line-height: 1.45;
      z-index: 5;
      pointer-events: none;
    }

    @media (max-width: 760px) {
      .mission-grid { grid-template-columns: 1fr; }
      #returnBtn { min-width: 170px; right: 12px; bottom: 12px; }
      #hud { left: 12px; bottom: 12px; min-width: 210px; }
      #hint { left: 12px; right: 12px; max-width: none; }
    }

    @keyframes locationIntro {
      from { opacity: 0; transform: perspective(520px) rotateX(16deg) scaleX(1.09) scale(0.94); filter: blur(3px); }
      to { opacity: 1; transform: perspective(520px) rotateX(9deg) scaleX(1.04) scale(1); filter: blur(0); }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="hint"></div>
  <div id="hud"><span class="visor"></span><span id="location">STARBASE TEXAS // 2075</span></div>
  <button id="returnBtn">RETURN TO STARBASE</button>
  <button id="earthViewBtn">↺ EARTH VIEW</button>
  <div id="tooltip"></div>
  <div id="welcome">Welcome to the Moon.<br>Galactic Resource Utilization Space.</div>
  <section id="missionPanel" aria-label="Mission Control">
    <h2>MISSION CONTROL DOME</h2>
    <div class="mission-grid">
      <button class="mission-card" data-dest="orbit"><strong>Launch to Orbit</strong><span>Falcon-heritage Colossus ascent to the AI1 constellation.</span></button>
      <button class="mission-card" data-dest="gateway"><strong>Lunar Transfer</strong><span>Dock at Gateway Station and stage for Mare Imbrium.</span></button>
      <button class="mission-card" data-dest="moon"><strong>GRU Hotel — Mare Imbrium</strong><span>Surface arrival at the pit-shielded lunar habitat.</span></button>
    </div>
    <button id="closePanel">CLOSE</button>
  </section>
  <div id="iris"></div>

  <script type="importmap">
    { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    } }
  </script>
  <script type="module" src="./core/app.js"></script>
</body>
</html>
