<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frontier 2075: Moonbound Transit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bungee+Inline&family=Orbitron:wght@700;900&family=Oxanium:wght@600;800&family=Russo+One&family=Saira+Condensed:wght@600&family=Share+Tech+Mono&family=Teko:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --beskar: #7a8a9c;
      --charcoal: #1a1d24;
      --amber: #ff9a3c;
      --hero-gold: #ffd23f;
      --hero-stroke: #5e4500;
      --hero-core: #090b10;
      --text: #e8e8e0;
      --telemetry: rgba(232, 232, 224, 0.72);
      --panel: rgba(16, 20, 28, 0.78);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000000;
      color: var(--text);
      font-family: "Share Tech Mono", "Courier New", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    #hud {
      position: fixed;
      left: 18px;
      bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 250px;
      padding: 11px 15px;
      border: 1px solid rgba(255, 154, 60, 0.42);
      background: linear-gradient(90deg, rgba(26, 29, 36, 0.9), rgba(26, 29, 36, 0.54));
      color: var(--hero-gold);
      font-family: "Bungee Inline", "Orbitron", "Audiowide", sans-serif;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.085em;
      text-transform: uppercase;
      -webkit-text-stroke: 1.15px var(--hero-gold);
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.9), 0 0 16px rgba(255, 174, 0, 0.72), 0 0 34px rgba(255, 154, 60, 0.28);
      backdrop-filter: blur(12px);
      clip-path: polygon(9% 0, 91% 0, 100% 34%, 93% 100%, 7% 100%, 0 34%);
      z-index: 6;
      pointer-events: none;
    }

    .visor {
      width: 24px;
      height: 14px;
      border: 2px solid var(--amber);
      border-bottom-width: 5px;
      clip-path: polygon(0 0, 100% 0, 82% 100%, 18% 100%);
      filter: drop-shadow(0 0 8px rgba(255, 154, 60, 0.8));
    }

    #returnBtn, #menuBtn, .mission-card, #closePanel {
      font: 700 14px "Russo One", "Oxanium", sans-serif;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text);
      border: 1px solid rgba(255, 154, 60, 0.55);
      background: rgba(26, 29, 36, 0.78);
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    #returnBtn {
      position: fixed;
      right: 18px;
      bottom: 18px;
      min-width: 198px;
      height: 44px;
      padding: 0 18px;
      clip-path: polygon(8% 0, 92% 0, 100% 50%, 92% 100%, 8% 100%, 0 50%);
      z-index: 6;
      display: none;
    }

    #menuBtn {
      position: fixed;
      right: 18px;
      top: 18px;
      min-width: 132px;
      height: 44px;
      padding: 0 18px;
      clip-path: polygon(8% 0, 92% 0, 100% 50%, 92% 100%, 8% 100%, 0 50%);
      z-index: 6;
    }

    #location {
      display: inline-block;
      transform: perspective(520px) rotateX(9deg) scaleX(1.04);
      transform-origin: left center;
      animation: locationIntro 740ms cubic-bezier(.16,1,.3,1) 120ms both;
    }

    #earthViewBtn, #inspectBtn {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      min-width: 168px;
      height: 44px;
      padding: 0 18px;
      clip-path: polygon(8% 0, 92% 0, 100% 50%, 92% 100%, 8% 100%, 0 50%);
      z-index: 6;
      display: none;
    }

    #inspectBtn {
      bottom: 72px;
      min-width: 196px;
    }

    #returnBtn:hover, #menuBtn:hover, #earthViewBtn:hover, .mission-card:hover, #closePanel:hover {
      border-color: var(--amber);
      background: rgba(255, 154, 60, 0.16);
      transform: translateY(-1px);
    }

    #earthViewBtn:hover {
      transform: translateX(-50%) translateY(-1px);
    }

    #inspectBtn:hover {
      transform: translateX(-50%) translateY(-1px);
    }

    #tooltip {
      position: fixed;
      left: 0;
      top: 0;
      transform: translate(-50%, calc(-100% - 18px));
      min-width: 210px;
      padding: 10px 14px 12px;
      border: 1px solid rgba(255, 154, 60, 0.7);
      background: rgba(10, 13, 18, 0.86);
      color: var(--telemetry);
      font-family: "Share Tech Mono", monospace;
      font-size: 12px;
      line-height: 1.35;
      pointer-events: none;
      opacity: 0;
      clip-path: polygon(12% 0, 88% 0, 100% 35%, 90% 100%, 10% 100%, 0 35%);
      filter: drop-shadow(0 0 18px rgba(255, 154, 60, 0.28));
      z-index: 7;
    }

    #tooltip strong {
      color: var(--amber);
      font-family: "Russo One", "Oxanium", sans-serif;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 154, 60, 0.38);
    }

    #missionPanel {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      width: min(560px, calc(100vw - 32px));
      padding: 22px;
      border: 1px solid rgba(255, 154, 60, 0.62);
      background: rgba(9, 12, 18, 0.88);
      box-shadow: 0 0 48px rgba(255, 154, 60, 0.16), inset 0 0 38px rgba(122, 138, 156, 0.08);
      backdrop-filter: blur(18px);
      clip-path: polygon(10% 0, 90% 0, 100% 24%, 95% 100%, 5% 100%, 0 24%);
      opacity: 0;
      pointer-events: none;
      z-index: 9;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #missionPanel.open {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    #missionPanel h2 {
      margin: 0 0 16px;
      color: var(--amber);
      font-family: "Russo One", "Oxanium", sans-serif;
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      -webkit-text-stroke: 0.4px rgba(8, 10, 14, 0.8);
      text-shadow: 0 0 10px rgba(255, 154, 60, 0.36);
      text-align: center;
    }

    .mission-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .mission-card {
      min-height: 106px;
      padding: 14px 12px;
      text-align: left;
      clip-path: polygon(8% 0, 92% 0, 100% 18%, 94% 100%, 6% 100%, 0 18%);
    }

    .mission-card strong {
      display: block;
      color: var(--text);
      font-family: "Russo One", "Oxanium", sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.05em;
      line-height: 1.2;
      margin-bottom: 8px;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 154, 60, 0.26);
    }

    .mission-card span {
      color: var(--telemetry);
      font-family: "Share Tech Mono", monospace;
      font-size: 11px;
      line-height: 1.35;
    }

    #closePanel {
      display: block;
      margin: 15px auto 0;
      height: 34px;
      padding: 0 18px;
      clip-path: polygon(12% 0, 88% 0, 100% 50%, 88% 100%, 12% 100%, 0 50%);
    }

    #welcome {
      position: fixed;
      left: 50%;
      top: 29%;
      transform: translate(-50%, -50%);
      width: min(680px, calc(100vw - 34px));
      color: var(--hero-gold);
      font-family: "Bungee Inline", "Orbitron", "Audiowide", sans-serif;
      text-align: center;
      font-size: clamp(18px, 3vw, 34px);
      font-weight: 900;
      letter-spacing: 0.085em;
      text-transform: uppercase;
      line-height: 1.24;
      -webkit-text-stroke: 1.35px var(--hero-gold);
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.9), 0 0 16px rgba(255, 174, 0, 0.78), 0 0 42px rgba(255, 154, 60, 0.34);
      opacity: 0;
      z-index: 5;
      pointer-events: none;
      transition: opacity 700ms ease, transform 700ms ease;
    }

    #welcome.show {
      opacity: 1;
      transform: translate(-50%, -62%);
    }

    #iris {
      position: fixed;
      inset: 0;
      background: #020306;
      z-index: 20;
      pointer-events: none;
      clip-path: circle(0% at 50% 50%);
    }

    #cinemaOverlay {
      position: fixed;
      inset: 0;
      z-index: 22;
      display: grid;
      place-items: center;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 220ms ease, transform 900ms cubic-bezier(.16,1,.3,1);
      perspective: 760px;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 210, 63, 0.08), transparent 26%),
        radial-gradient(circle at 50% 50%, rgba(74, 168, 255, 0.05), transparent 42%),
        rgba(2, 3, 6, 0.74);
    }

    #cinemaOverlay.show {
      opacity: 1;
      transform: scale(1);
    }

    #cinemaOverlay::before,
    #cinemaOverlay::after {
      content: "";
      position: absolute;
      inset: -18%;
      background-image:
        radial-gradient(circle, rgba(232,232,224,0.88) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(255,210,63,0.55) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(109,180,255,0.45) 0 1px, transparent 1.5px);
      background-size: 112px 112px, 173px 173px, 251px 251px;
      background-position: 0 0, 41px 67px, 91px 33px;
      opacity: 0.58;
      transform: translateZ(-80px);
      animation: starDrift 18s linear infinite;
    }

    #cinemaOverlay::after {
      opacity: 0.22;
      filter: blur(0.4px);
      animation-duration: 34s;
      animation-direction: reverse;
    }

    .cinema-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 48%, transparent 0 42%, rgba(2,3,6,0.34) 66%, #020306 100%),
        linear-gradient(180deg, rgba(2,3,6,0.82), transparent 24%, transparent 70%, rgba(2,3,6,0.86));
      mix-blend-mode: multiply;
    }

    .cinema-hyperspace {
      position: absolute;
      inset: -20%;
      opacity: 0;
      transform: scale(0.76);
      background:
        repeating-radial-gradient(ellipse at 50% 50%, rgba(159,211,255,0) 0 7px, rgba(159,211,255,0.7) 8px 9px, rgba(159,211,255,0) 10px 18px),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.82), rgba(109,180,255,0.18) 5%, transparent 30%);
      filter: blur(0.3px);
    }

    #cinemaOverlay.hyperspace .cinema-hyperspace {
      animation: hyperspaceBloom 1180ms cubic-bezier(.76,0,.24,1) both;
    }

    #cinemaOverlay.iris .cinema-hyperspace {
      animation: irisPulse 1080ms ease both;
    }

    .cinema-card {
      position: relative;
      display: grid;
      justify-items: center;
      width: min(920px, calc(100vw - 36px));
      padding: 28px 18px;
      text-align: center;
      transform-style: preserve-3d;
      animation: titleResolve 1280ms cubic-bezier(.16,1,.3,1) both;
    }

    .cinema-kicker,
    .cinema-subtitle,
    .cinema-signature {
      position: relative;
      z-index: 2;
      text-transform: uppercase;
    }

    .cinema-kicker {
      color: var(--amber);
      font-family: "Oxanium", "Russo One", sans-serif;
      font-size: clamp(12px, 1.8vw, 18px);
      font-weight: 800;
      letter-spacing: 0.32em;
      text-shadow: 0 0 16px rgba(255, 154, 60, 0.42);
    }

    .cinema-title {
      position: relative;
      z-index: 2;
      margin: 4px 0 8px;
      color: var(--hero-core);
      font-family: "Bungee Inline", "Orbitron", "Audiowide", sans-serif;
      font-size: clamp(46px, 10.6vw, 132px);
      font-weight: 900;
      line-height: 0.84;
      letter-spacing: 0.075em;
      text-transform: uppercase;
      transform: perspective(560px) rotateX(11deg) scaleX(1.06);
      -webkit-text-stroke: clamp(1.4px, 0.24vw, 3px) var(--hero-gold);
      text-shadow:
        0 0 1px #fff2a6,
        0 0 18px rgba(255, 174, 0, 0.9),
        0 0 56px rgba(255, 154, 60, 0.38),
        0 11px 0 rgba(0, 0, 0, 0.64);
      filter: drop-shadow(0 0 18px rgba(255, 210, 63, 0.25));
    }

    .cinema-title::before,
    .cinema-title::after {
      content: "";
      position: absolute;
      left: 50%;
      width: min(78vw, 560px);
      height: 2px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(255,210,63,0.86), transparent);
      box-shadow: 0 0 14px rgba(255, 174, 0, 0.62);
    }

    .cinema-title::before { top: -12px; }
    .cinema-title::after { bottom: -14px; }

    .cinema-subtitle {
      max-width: 740px;
      color: var(--text);
      font-family: "Saira Condensed", "Oxanium", sans-serif;
      font-size: clamp(18px, 3vw, 32px);
      font-weight: 600;
      letter-spacing: 0.12em;
      line-height: 1.05;
      text-shadow: 0 0 16px rgba(255, 154, 60, 0.28);
    }

    .cinema-signature {
      margin-top: 18px;
      color: var(--telemetry);
      font-family: "Share Tech Mono", monospace;
      font-size: clamp(11px, 1.6vw, 14px);
      letter-spacing: 0.2em;
    }

    .cinema-crawl {
      position: absolute;
      left: 50%;
      bottom: -28%;
      width: min(680px, calc(100vw - 46px));
      color: var(--hero-gold);
      font-family: "Orbitron", "Oxanium", sans-serif;
      font-size: clamp(17px, 2.5vw, 27px);
      font-weight: 700;
      line-height: 1.55;
      letter-spacing: 0.055em;
      text-align: justify;
      text-transform: uppercase;
      opacity: 0;
      transform-origin: 50% 100%;
      transform: translateX(-50%) perspective(420px) rotateX(63deg) translateY(120%);
      text-shadow: 0 0 12px rgba(255, 174, 0, 0.58);
    }

    #cinemaOverlay.crawl .cinema-card {
      transform: translateY(-18vh) scale(0.78);
      animation: titleResolve 900ms cubic-bezier(.16,1,.3,1) both;
    }

    #cinemaOverlay.crawl .cinema-crawl {
      animation: crawlAway 4300ms linear 250ms both;
    }

    @media (max-width: 760px) {
      .cinema-card { padding: 18px 10px; }
      .cinema-title { letter-spacing: 0.045em; }
      .cinema-kicker { letter-spacing: 0.18em; }
      .cinema-subtitle { letter-spacing: 0.08em; }
    }

    @media (prefers-reduced-motion: reduce) {
      #cinemaOverlay::before,
      #cinemaOverlay::after,
      .cinema-card,
      .cinema-crawl,
      #cinemaOverlay.hyperspace .cinema-hyperspace,
      #cinemaOverlay.iris .cinema-hyperspace {
        animation: none !important;
      }
    }

    #hint {
      position: fixed;
      left: 18px;
      top: 18px;
      max-width: 440px;
      padding: 11px 14px;
      color: var(--telemetry);
      font-family: "Share Tech Mono", monospace;
      border-left: 2px solid rgba(255, 154, 60, 0.58);
      background: rgba(4, 6, 10, 0.34);
      font-size: 12px;
      line-height: 1.45;
      z-index: 5;
      pointer-events: none;
    }

    @media (max-width: 760px) {
      .mission-grid { grid-template-columns: 1fr; }
      #returnBtn { min-width: 170px; right: 12px; bottom: 12px; }
      #hud { left: 12px; bottom: 12px; min-width: 210px; }
      #hint { left: 12px; right: 12px; max-width: none; }
    }

    @keyframes locationIntro {
      from { opacity: 0; transform: perspective(520px) rotateX(16deg) scaleX(1.09) scale(0.94); filter: blur(3px); }
      to { opacity: 1; transform: perspective(520px) rotateX(9deg) scaleX(1.04) scale(1); filter: blur(0); }
    }

    @keyframes starDrift {
      from { transform: translate3d(0, 0, -80px) rotate(0.001deg); }
      to { transform: translate3d(-72px, 92px, -80px) rotate(0.001deg); }
    }

    @keyframes titleResolve {
      0% { opacity: 0; transform: translate3d(0, 42px, -180px) rotateX(18deg) scale(1.18); filter: blur(8px); }
      48% { opacity: 1; filter: blur(0); }
      100% { opacity: 1; transform: translate3d(0, 0, 0) rotateX(0) scale(1); filter: blur(0); }
    }

    @keyframes crawlAway {
      0% { opacity: 0; transform: translateX(-50%) perspective(420px) rotateX(63deg) translateY(120%) scale(1.18); }
      12% { opacity: 1; }
      86% { opacity: 0.98; }
      100% { opacity: 0; transform: translateX(-50%) perspective(420px) rotateX(63deg) translateY(-78%) scale(0.52); }
    }

    @keyframes hyperspaceBloom {
      0% { opacity: 0; transform: scale(0.36) rotate(0deg); }
      32% { opacity: 0.9; }
      100% { opacity: 0; transform: scale(2.4) rotate(9deg); }
    }

    @keyframes irisPulse {
      0%, 100% { opacity: 0; transform: scale(0.9); }
      50% { opacity: 0.38; transform: scale(1.18); }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="hint"></div>
  <div id="hud"><span class="visor"></span><span id="location">FRONTIER 2075 // STARBASE TEXAS</span></div>
  <button id="menuBtn">MENU</button>
  <button id="returnBtn">RETURN TO FIRST LIGHT</button>
  <button id="earthViewBtn">↺ EARTH VIEW</button>
  <button id="inspectBtn">ENTER STRUCTURE</button>
  <div id="tooltip"></div>
  <div id="welcome">Welcome to Imbrium Haven.<br>Earth is still in the sky.</div>
  <section id="missionPanel" aria-label="Mission Control">
    <h2>FRONTIER MISSION ROUTES</h2>
    <div class="mission-grid">
      <button class="mission-card" data-dest="hub"><strong>First Light</strong><span>Return to Starbase Texas and the Colossus launch coast.</span></button>
      <button class="mission-card" data-dest="orbit"><strong>The First Climb</strong><span>Ride Colossus from the Texas coast into the Guardian Net.</span></button>
      <button class="mission-card" data-dest="gateway"><strong>The Crossing</strong><span>Enter Gateway Station, the spinning city between Earth and Moon.</span></button>
      <button class="mission-card" data-dest="moon"><strong>Imbrium Haven</strong><span>Touch down where lunar night becomes a human address.</span></button>
      <button class="mission-card" data-dest="starcloud"><strong>Starcloud Atlas</strong><span>Walk the kilometre-scale orbital data center beyond the swarm.</span></button>
    </div>
    <button id="closePanel">CLOSE</button>
  </section>
  <section id="cinemaOverlay" aria-live="polite" aria-hidden="true">
    <div class="cinema-hyperspace"></div>
    <div class="cinema-vignette"></div>
    <div class="cinema-card">
      <div class="cinema-kicker" id="cinemaKicker"></div>
      <div class="cinema-title" id="cinemaTitle"></div>
      <div class="cinema-subtitle" id="cinemaSubtitle"></div>
      <div class="cinema-signature" id="cinemaSignature"></div>
    </div>
    <div class="cinema-crawl" id="cinemaCrawl"></div>
  </section>
  <div id="iris"></div>

  <script type="importmap">
    { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    } }
  </script>
  <script type="module" src="./core/app.js?v=real-earth-moon-scale-1"></script>
</body>
</html>
