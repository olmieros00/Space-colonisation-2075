<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frontier 2075: Moonbound Transit</title>
  <style>
    :root {
      --beskar: #7a8a9c;
      --charcoal: #1a1d24;
      --amber: #ff9a3c;
      --text: #e8e8e0;
      --panel: rgba(16, 20, 28, 0.78);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #05070b;
      color: var(--text);
      font-family: "Courier New", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    #hud {
      position: fixed;
      left: 18px;
      bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 250px;
      padding: 11px 15px;
      border: 1px solid rgba(255, 154, 60, 0.42);
      background: linear-gradient(90deg, rgba(26, 29, 36, 0.9), rgba(26, 29, 36, 0.54));
      color: var(--text);
      font-size: 13px;
      letter-spacing: 0;
      backdrop-filter: blur(12px);
      clip-path: polygon(9% 0, 91% 0, 100% 34%, 93% 100%, 7% 100%, 0 34%);
      z-index: 6;
      pointer-events: none;
    }

    .visor {
      width: 24px;
      height: 14px;
      border: 2px solid var(--amber);
      border-bottom-width: 5px;
      clip-path: polygon(0 0, 100% 0, 82% 100%, 18% 100%);
      filter: drop-shadow(0 0 8px rgba(255, 154, 60, 0.8));
    }

    #returnBtn, .mission-card, #closePanel {
      font: 13px "Courier New", monospace;
      color: var(--text);
      border: 1px solid rgba(255, 154, 60, 0.55);
      background: rgba(26, 29, 36, 0.78);
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    #returnBtn {
      position: fixed;
      right: 18px;
      bottom: 18px;
      min-width: 198px;
      height: 44px;
      padding: 0 18px;
      clip-path: polygon(8% 0, 92% 0, 100% 50%, 92% 100%, 8% 100%, 0 50%);
      z-index: 6;
      display: none;
    }

    #earthViewBtn, #inspectBtn {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      min-width: 168px;
      height: 44px;
      padding: 0 18px;
      clip-path: polygon(8% 0, 92% 0, 100% 50%, 92% 100%, 8% 100%, 0 50%);
      z-index: 6;
      display: none;
    }

    #inspectBtn {
      bottom: 72px;
      min-width: 196px;
    }

    #returnBtn:hover, #earthViewBtn:hover, #inspectBtn:hover, .mission-card:hover, #closePanel:hover {
      border-color: var(--amber);
      background: rgba(255, 154, 60, 0.16);
      transform: translateY(-1px);
    }

    #earthViewBtn:hover {
      transform: translateX(-50%) translateY(-1px);
    }

    #inspectBtn:hover {
      transform: translateX(-50%) translateY(-1px);
    }

    #tooltip {
      position: fixed;
      left: 0;
      top: 0;
      transform: translate(-50%, calc(-100% - 18px));
      min-width: 210px;
      padding: 10px 14px 12px;
      border: 1px solid rgba(255, 154, 60, 0.7);
      background: rgba(10, 13, 18, 0.86);
      color: var(--text);
      font-size: 12px;
      line-height: 1.35;
      pointer-events: none;
      opacity: 0;
      clip-path: polygon(12% 0, 88% 0, 100% 35%, 90% 100%, 10% 100%, 0 35%);
      filter: drop-shadow(0 0 18px rgba(255, 154, 60, 0.28));
      z-index: 7;
    }

    #missionPanel {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      width: min(560px, calc(100vw - 32px));
      padding: 22px;
      border: 1px solid rgba(255, 154, 60, 0.62);
      background: rgba(9, 12, 18, 0.88);
      box-shadow: 0 0 48px rgba(255, 154, 60, 0.16), inset 0 0 38px rgba(122, 138, 156, 0.08);
      backdrop-filter: blur(18px);
      clip-path: polygon(10% 0, 90% 0, 100% 24%, 95% 100%, 5% 100%, 0 24%);
      opacity: 0;
      pointer-events: none;
      z-index: 9;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #missionPanel.open {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    #missionPanel h2 {
      margin: 0 0 16px;
      color: var(--amber);
      font-size: 17px;
      font-weight: 700;
      text-align: center;
    }

    .mission-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .mission-card {
      min-height: 106px;
      padding: 14px 12px;
      text-align: left;
      clip-path: polygon(8% 0, 92% 0, 100% 18%, 94% 100%, 6% 100%, 0 18%);
    }

    .mission-card strong {
      display: block;
      color: var(--text);
      font-size: 13px;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .mission-card span {
      color: rgba(232, 232, 224, 0.7);
      font-size: 11px;
      line-height: 1.35;
    }

    #closePanel {
      display: block;
      margin: 15px auto 0;
      height: 34px;
      padding: 0 18px;
      clip-path: polygon(12% 0, 88% 0, 100% 50%, 88% 100%, 12% 100%, 0 50%);
    }

    #welcome {
      position: fixed;
      left: 50%;
      top: 29%;
      transform: translate(-50%, -50%);
      width: min(680px, calc(100vw - 34px));
      color: var(--amber);
      text-align: center;
      font-size: clamp(18px, 3vw, 34px);
      line-height: 1.24;
      text-shadow: 0 0 18px rgba(255, 154, 60, 0.75), 0 0 46px rgba(255, 154, 60, 0.24);
      opacity: 0;
      z-index: 5;
      pointer-events: none;
      transition: opacity 700ms ease, transform 700ms ease;
    }

    #welcome.show {
      opacity: 1;
      transform: translate(-50%, -62%);
    }

    #iris {
      position: fixed;
      inset: 0;
      background: #020306;
      z-index: 20;
      pointer-events: none;
      clip-path: circle(0% at 50% 50%);
    }

    #hint {
      position: fixed;
      left: 18px;
      top: 18px;
      max-width: 440px;
      padding: 11px 14px;
      color: rgba(232, 232, 224, 0.72);
      border-left: 2px solid rgba(255, 154, 60, 0.58);
      background: rgba(4, 6, 10, 0.34);
      font-size: 12px;
      line-height: 1.45;
      z-index: 5;
      pointer-events: none;
    }

    @media (max-width: 760px) {
      .mission-grid { grid-template-columns: 1fr; }
      #returnBtn { min-width: 170px; right: 12px; bottom: 12px; }
      #hud { left: 12px; bottom: 12px; min-width: 210px; }
      #hint { left: 12px; right: 12px; max-width: none; }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="hint"></div>
  <div id="hud"><span class="visor"></span><span id="location">FRONTIER 2075 // STARBASE TEXAS</span></div>
  <button id="returnBtn">RETURN TO FIRST LIGHT</button>
  <button id="earthViewBtn">↺ EARTH VIEW</button>
  <button id="inspectBtn">ENTER STRUCTURE</button>
  <div id="tooltip"></div>
  <div id="welcome">Welcome to Imbrium Haven.<br>Earth is still in the sky.</div>
  <section id="missionPanel" aria-label="Mission Control">
    <h2>FRONTIER MISSION ROUTES</h2>
    <div class="mission-grid">
      <button class="mission-card" data-dest="orbit"><strong>The First Climb</strong><span>Ride Colossus from the Texas coast into the Guardian Net.</span></button>
      <button class="mission-card" data-dest="gateway"><strong>The Crossing</strong><span>Enter Gateway Station, the spinning city between Earth and Moon.</span></button>
      <button class="mission-card" data-dest="moon"><strong>Imbrium Haven</strong><span>Touch down where lunar night becomes a human address.</span></button>
    </div>
    <button id="closePanel">CLOSE</button>
  </section>
  <div id="iris"></div>

  <script type="importmap">
    { "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js" } }
  </script>
  <script type="module" src="./core/app.js"></script>
</body>
</html>
